<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow - To Do Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#f8fafc,#e2e8f0);
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    color:#0f172a;
    font-size:3rem;
    margin-bottom:8px;
}

.header p{
    color:#64748b;
    font-size:1rem;
}

.task-form{
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    margin-bottom:25px;
}

.form-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

input,select{
    padding:14px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    font-size:15px;
    outline:none;
}

input:focus,
select:focus{
    border-color:#3b82f6;
}

#taskInput{
    flex:1;
    min-width:250px;
}

.add-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:14px 24px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.add-btn:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

.task-sections{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.section{
    background:white;
    border-radius:18px;
    padding:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

.section h2{
    margin-bottom:20px;
    color:#0f172a;
}

.task-card{
    background:#f8fafc;
    border-left:5px solid #ef4444;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    transition:0.3s;
}

.task-card:hover{
    transform:translateY(-2px);
}

.completed-card{
    border-left:5px solid #2563eb;
}

.task-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.task-title{
    font-size:16px;
    font-weight:600;
    color:#1e293b;
    word-break:break-word;
}

.badge{
    padding:6px 12px;
    border-radius:20px;
    color:white;
    font-size:12px;
    font-weight:600;
}

.pending{
    background:#ef4444;
}

.completed{
    background:#2563eb;
}

.priority{
    display:inline-block;
    margin-top:10px;
    padding:5px 10px;
    border-radius:15px;
    color:white;
    font-size:12px;
    font-weight:500;
}

.high{
    background:#dc2626;
}

.medium{
    background:#f59e0b;
}

.low{
    background:#10b981;
}

.time{
    margin-top:8px;
    font-size:12px;
    color:#64748b;
}

.actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:15px;
}

.actions button{
    border:none;
    padding:8px 12px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:13px;
    transition:0.3s;
}

.actions button:hover{
    opacity:0.9;
}

.complete-btn{
    background:#2563eb;
}

.edit-btn{
    background:#f59e0b;
}

.delete-btn{
    background:#dc2626;
}

.empty{
    text-align:center;
    padding:30px;
    color:#94a3b8;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.stat-box{
    background:white;
    padding:15px 25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    text-align:center;
}

.stat-box h3{
    color:#2563eb;
    font-size:24px;
}

.stat-box p{
    color:#64748b;
    font-size:14px;
}

@media(max-width:768px){

    .task-sections{
        grid-template-columns:1fr;
    }

    .form-row{
        flex-direction:column;
    }

    .add-btn{
        width:100%;
    }

    #taskInput{
        width:100%;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>📋 TaskFlow Dashboard</h1>
        <p>Organize your day efficiently</p>
    </div>

    <div class="stats">
        <div class="stat-box">
            <h3 id="totalTasks">0</h3>
            <p>Total Tasks</p>
        </div>

        <div class="stat-box">
            <h3 id="pendingCount">0</h3>
            <p>Pending</p>
        </div>

        <div class="stat-box">
            <h3 id="completedCount">0</h3>
            <p>Completed</p>
        </div>
    </div>

    <div class="task-form">

        <div class="form-row">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task..."
            >

            <select id="priority">
                <option value="High">🔴 High Priority</option>
                <option value="Medium">🟠 Medium Priority</option>
                <option value="Low">🟢 Low Priority</option>
            </select>

            <button class="add-btn" onclick="addTask()">
                ➕ Add Task
            </button>

        </div>

    </div>

    <div class="task-sections">

        <div class="section">
            <h2>🔴 Pending Tasks</h2>
            <div id="pendingTasks"></div>
        </div>

        <div class="section">
            <h2>🔵 Completed Tasks</h2>
            <div id="completedTasks"></div>
        </div>

    </div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){
    localStorage.setItem("tasks", JSON.stringify(tasks));
}

function priorityOrder(priority){

    if(priority === "High") return 1;
    if(priority === "Medium") return 2;
    return 3;
}

function addTask(){

    const taskInput = document.getElementById("taskInput");
    const priority = document.getElementById("priority").value;

    if(taskInput.value.trim() === ""){
        alert("Please enter a task");
        return;
    }

    tasks.push({
        id: Date.now(),
        text: taskInput.value.trim(),
        priority: priority,
        completed: false,
        createdAt: new Date().toLocaleString(),
        completedAt: null
    });

    taskInput.value = "";

    saveTasks();
    renderTasks();
}

function completeTask(id){

    const task = tasks.find(t => t.id === id);

    if(task){
        task.completed = true;
        task.completedAt = new Date().toLocaleString();
    }

    saveTasks();
    renderTasks();
}

function editTask(id){

    const task = tasks.find(t => t.id === id);

    if(!task) return;

    const updated = prompt("Edit Task", task.text);

    if(updated && updated.trim() !== ""){
        task.text = updated.trim();
        saveTasks();
        renderTasks();
    }
}

function deleteTask(id){

    if(confirm("Delete this task?")){

        tasks = tasks.filter(task => task.id !== id);

        saveTasks();
        renderTasks();
    }
}

function updateStats(){

    const total = tasks.length;
    const pending = tasks.filter(t => !t.completed).length;
    const completed = tasks.filter(t => t.completed).length;

    document.getElementById("totalTasks").textContent = total;
    document.getElementById("pendingCount").textContent = pending;
    document.getElementById("completedCount").textContent = completed;
}

function renderTasks(){

    const pendingContainer =
        document.getElementById("pendingTasks");

    const completedContainer =
        document.getElementById("completedTasks");

    pendingContainer.innerHTML = "";
    completedContainer.innerHTML = "";

    const sortedTasks = [...tasks].sort((a,b)=>{

        if(a.completed !== b.completed){
            return a.completed - b.completed;
        }

        return priorityOrder(a.priority) -
               priorityOrder(b.priority);
    });

    const pendingTasks =
        sortedTasks.filter(t => !t.completed);

    const completedTasks =
        sortedTasks.filter(t => t.completed);

    if(pendingTasks.length === 0){
        pendingContainer.innerHTML =
        "<div class='empty'>No Pending Tasks 🎉</div>";
    }

    if(completedTasks.length === 0){
        completedContainer.innerHTML =
        "<div class='empty'>No Completed Tasks Yet</div>";
    }

    sortedTasks.forEach(task=>{

        const card = document.createElement("div");

        card.className =
            task.completed
            ? "task-card completed-card"
            : "task-card";

        card.innerHTML = `

            <div class="task-header">

                <div class="task-title">
                    ${task.text}
                </div>

                <span class="badge ${
                    task.completed
                    ? "completed"
                    : "pending"
                }">

                ${
                    task.completed
                    ? "Completed"
                    : "Pending"
                }

                </span>

            </div>

            <span class="priority ${
                task.priority.toLowerCase()
            }">

            ${
                task.priority === "High"
                ? "🔴 High"
                : task.priority === "Medium"
                ? "🟠 Medium"
                : "🟢 Low"
            }

            </span>

            <div class="time">
                Added: ${task.createdAt}
            </div>

            ${
                task.completed
                ? `
                <div class="time">
                    Completed: ${task.completedAt}
                </div>
                `
                : ""
            }

            <div class="actions">

                ${
                    !task.completed
                    ? `
                    <button
                        class="complete-btn"
                        onclick="completeTask(${task.id})">
                        ✓ Complete
                    </button>
                    `
                    : ""
                }

                <button
                    class="edit-btn"
                    onclick="editTask(${task.id})">
                    ✏ Edit
                </button>

                <button
                    class="delete-btn"
                    onclick="deleteTask(${task.id})">
                    🗑 Delete
                </button>

            </div>
        `;

        if(task.completed){
            completedContainer.appendChild(card);
        }else{
            pendingContainer.appendChild(card);
        }

    });

    updateStats();
}

renderTasks();

</script>

</body>
</html>
